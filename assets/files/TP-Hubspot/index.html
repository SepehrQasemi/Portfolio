<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HubSpot Assignment - Sepehr Portfolio</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .tp-gallery {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .tp-figure {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--surface);
    }

    .tp-caption {
      padding: 8px 12px;
      border-top: 1px solid var(--line);
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 960px) {
      .tp-gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<header class="nav">
  <div class="container nav-inner">
    <a class="brand" href="../../../index.html">
      <span class="brand-mark" aria-hidden="true"></span>
      Sepehr Portfolio
    </a>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="../../../index.html">Home</a>
      <a href="../../../projects.html">Projects</a>
      <a href="../../../work.html">Work</a>
    </nav>
  </div>
</header>

<main class="container">
  <section class="hero">
    <p class="eyebrow">Course Deliverable</p>
    <h1>HubSpot Discovery Assignment</h1>
    <p>Screenshot sequence and short analysis from the practical CRM exercise.</p>
    <div class="btn-row">
      <a class="btn" href="../../../work.html">Back to Work</a>
      <a class="btn btn-primary" href="Analyse du TP.pdf" target="_blank" rel="noopener">Open Analysis PDF</a>
    </div>
  </section>

  <section class="section">
    <h2>Screenshots</h2>
    <div class="tp-gallery">
      <figure class="tp-figure"><img src="1.png" alt="HubSpot screenshot 1" /><figcaption class="tp-caption">Screenshot 1</figcaption></figure>
      <figure class="tp-figure"><img src="2.png" alt="HubSpot screenshot 2" /><figcaption class="tp-caption">Screenshot 2</figcaption></figure>
      <figure class="tp-figure"><img src="3.png" alt="HubSpot screenshot 3" /><figcaption class="tp-caption">Screenshot 3</figcaption></figure>
      <figure class="tp-figure"><img src="4.png" alt="HubSpot screenshot 4" /><figcaption class="tp-caption">Screenshot 4</figcaption></figure>
      <figure class="tp-figure"><img src="5.png" alt="HubSpot screenshot 5" /><figcaption class="tp-caption">Screenshot 5</figcaption></figure>
      <figure class="tp-figure"><img src="6.png" alt="HubSpot screenshot 6" /><figcaption class="tp-caption">Screenshot 6</figcaption></figure>
      <figure class="tp-figure"><img src="7.png" alt="HubSpot screenshot 7" /><figcaption class="tp-caption">Screenshot 7</figcaption></figure>
      <figure class="tp-figure"><img src="8.png" alt="HubSpot screenshot 8" /><figcaption class="tp-caption">Screenshot 8</figcaption></figure>
      <figure class="tp-figure"><img src="9.png" alt="HubSpot screenshot 9" /><figcaption class="tp-caption">Screenshot 9</figcaption></figure>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container">
    &copy; <span id="year"></span> Sepehr Qasemi |
    <a href="https://github.com/SepehrQasemi/Portfolio" target="_blank" rel="noopener">Portfolio Repo</a>
  </div>
</footer>
<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>
</body>
</html>
